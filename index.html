<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grito-Dex Retro | Kanto Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pokedex">
        <div class="top-lights">
            <div class="big-blue-light"></div>
            <div class="small-lights">
                <div class="light red"></div>
                <div class="light yellow"></div>
                <div class="light green"></div>
            </div>
        </div>

        <h1 class="title">GRITO-DEX</h1>
        
        <div class="filter-section">
            <select id="gen-select">
                <option value="1">GEN 1</option>
                <option value="2">GEN 2</option>
                <option value="3">GEN 3</option>
                <option value="all">TODAS</option>
            </select>
        </div>

        <div class="screen-container">
            <div id="main-screen">
                <div id="audio-section">
                    <button id="play-btn">REPRODUCIR GRITO</button>
                </div>
                
                <div id="options-container" class="options-grid">
                    </div>
            </div>
        </div>

        <div id="feedback" class="hidden">
            <p id="message"></p>
            <button id="next-btn">SIGUIENTE</button>
        </div>

        <div class="pokedex-decoration">
            <div class="d-pad"></div>
            <div class="long-buttons">
                <div class="long-btn black"></div>
                <div class="long-btn black"></div>
            </div>
        </div>
    </div>

    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-error" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
